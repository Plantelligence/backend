name: Backend CI/CD — Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: azure-deploy
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Create deployment zip
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "*.github*" \
            --exclude "*__pycache__*" \
            --exclude "*.pyc" \
            --exclude ".env" \
            --exclude "deploy.zip" \
            --exclude ".python_packages/*"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: planti-api
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: deploy.zip

      - name: Wait for app to start
        run: sleep 60

      - name: Validate deployment
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://planti-api-aghhf0a7b3hdfpbr.brazilsouth-01.azurewebsites.net/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "App não respondeu com 200 após o deploy"
            exit 1
          fi
          echo "Deploy validado com sucesso"
